name: "CI — IntoWork Dashboard"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend — Python FastAPI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intowork_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/intowork_test
      NEXTAUTH_SECRET: test-secret-minimum-32-characters-long
      JWT_SECRET: test-jwt-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — all Python files
        continue-on-error: false
        run: |
          echo "Checking Python syntax in backend/app/..."
          errors=0
          while IFS= read -r file; do
            if ! python -c "import ast; ast.parse(open('$file').read())" 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              python -c "import ast; ast.parse(open('$file').read())"
              errors=$((errors + 1))
            fi
          done < <(find backend/app -name "*.py" -type f)

          if [ "$errors" -gt 0 ]; then
            echo "Found $errors file(s) with syntax errors."
            exit 1
          fi
          echo "All Python files passed syntax check."

      - name: Run pytest
        continue-on-error: false
        run: |
          cd backend
          if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' -type f | head -1)" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No test files found in backend/tests/ — skipping."
          fi

  frontend:
    name: Frontend — Next.js 16
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
      AUTH_SECRET: test-secret-minimum-32-characters-long

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        continue-on-error: false
        run: cd frontend && npx tsc --noEmit

      - name: ESLint check
        continue-on-error: false
        run: cd frontend && npx next lint --max-warnings 0

      - name: Build check
        continue-on-error: false
        run: cd frontend && npm run build
